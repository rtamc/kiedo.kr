<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sites - kiedo.kr</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<header>
<div class="logo">kiedo.kr</div>

<nav>
<a href="/">Home</a>
<a href="/sites">Sites</a>
</nav>
</header>

<main>

<h1>사이트 목록</h1>

<div class="site-grid">

{% for site in sites %}
<div class="card">

<h2>{{ site.name }}</h2>

<p>{{ site.desc }}</p>

<a class="visit" href="{{ site.url }}" target="_blank">
Visit Site
</a>

</div>
{% endfor %}

</div>

</main>

</body>
</html>
